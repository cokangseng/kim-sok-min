    <style amp-custom>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: monospace;
        position: relative;
        background: #000000;
        background-image: radial-gradient(#282857 5%, transparent 50%);
        background-size: 5px 5px;
        background-attachment: fixed;
      }

      .container {
        max-width: 400px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow-x: hidden;
      }

      .welcome {
        max-width: 350px;
        margin: 0 auto;
        margin-bottom: 15px;
      }

      .welcome h3 {
        font-size: 12px;
        color: #fff;
        overflow: hidden;
        border-right: 0.15em solid #fbf4a0;
        white-space: nowrap;
        letter-spacing: 0.09em;
        animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
      }

      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      @keyframes blink-caret {
        from,
        to {
          border-color: transparent;
        }
        50% {
          border-color: #fbf4a0;
        }
      }

      .poster-wrapper {
        position: relative;
        border-radius: 16px;
        margin: 10px 0;
      }

      .poster-border {
        position: relative;
        padding: 4px;
        border-radius: 16px;
        background: linear-gradient(90deg, #ff0000, #abf903, #ffff00, #ea00d2, #0080ff, #8000ff, #f58301);
        background-size: 200% 100%;
        animation: borderRunning 2s linear infinite;
      }

      @keyframes borderRunning {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 200% 50%;
        }
      }

      .poster-border amp-img {
        border-radius: 12px;
        display: block;
        width: 100%;
        height: auto;
      }

      .poster-border::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          rgba(255, 255, 255, 0.6),
          rgba(255, 255, 255, 0.4),
          transparent
        );
        transform: skewX(-25deg);
        animation: shinePoster 3s ease-in-out infinite;
        pointer-events: none;
        border-radius: 12px;
        z-index: 2;
      }

      @keyframes shinePoster {
        0% {
          left: -100%;
        }
        50% {
          left: 150%;
        }
        100% {
          left: 150%;
        }
      }

      .poster-border::after {
        content: '';
        position: absolute;
        top: -8px;
        left: -8px;
        right: -8px;
        bottom: -8px;
        background: linear-gradient(90deg, #ff0080, #ff8c00, #ffff00, #00ff80, #0080ff, #8000ff, #ff0080);
        background-size: 200% 100%;
        border-radius: 22px;
        z-index: -2;
        opacity: 0.5;
        filter: blur(12px);
        animation: borderRunning 2s linear infinite;
        pointer-events: none;
      }

      .btn-login,
      .btn-daftar {
        padding: 15px;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        text-align: center;
        margin-top: 20px;
        position: relative;
        overflow: hidden;
        border-radius: 50px;
        transition: all 0.3s ease;
        z-index: 1;
        display: block;
      }

      .btn-login {
        background: linear-gradient(135deg, #fb0000, #01f7eb);
        color: #2f05ed;
        border: 1.5px solid rgba(248, 0, 0, 0.2);
      }

      /* Perbaikan utama: selector .btn-daftar ditulis utuh tanpa baris baru */
      .btn-daftar {
        background: linear-gradient(135deg, #fb0000, #01f7eb), url();
        background-blend-mode: overlay;
        background-size: cover;
        color: #2f05ed;
        font-weight: 900;
        box-shadow: 0 0 15px rgba(255, 187, 0, 0.5);
        animation: pulse 1.5s ease-in-out infinite;
      }

      .btn-login::after,
      .btn-daftar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 80%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.5),
          rgba(255, 255, 255, 0.8),
          rgba(255, 255, 255, 0.5),
          transparent
        );
        transform: skewX(-25deg);
        animation: glowLewat 2.5s ease-in-out infinite;
        pointer-events: none;
        border-radius: 50px;
        z-index: 1;
      }

      @keyframes glowLewat {
        0% {
          left: -100%;
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          left: 150%;
          opacity: 0;
        }
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 10px rgba(255, 187, 0, 0.4);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 25px rgba(255, 187, 0, 0.8), 0 0 15px rgba(255, 187, 0, 0.5);
          transform: scale(1.02);
        }
        100% {
          box-shadow: 0 0 10px rgba(255, 187, 0, 0.4);
          transform: scale(1);
        }
      }

      .btn-login::before,
      .btn-daftar::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(90deg, #ff0080, #ff8c00, #ffff00, #00ff80, #0080ff, #8000ff, #ff0080);
        background-size: 200% 100%;
        border-radius: 50px;
        z-index: -2;
        opacity: 0;
        transition: opacity 0.3s;
        animation: borderRunning 1.5s linear infinite;
      }

      .btn-login:hover::before,
      .btn-daftar:hover::before {
        opacity: 1;
      }

      .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
      }

      .btn-daftar:hover::after {
        animation: glowLewat 1s ease-in-out infinite;
      }

      .btn-login:active,
      .btn-daftar:active {
        transform: scale(0.97);
      }

      .copyright {
        text-align: center;

        margin-top: 20px;

      .copyright a {

      .seo-name {
        display: inline-block;
        color: #ffbb00;
        font-weight: bold;
        font-size: 1.1em;
        letter-spacing: 1px;
        cursor: pointer;
        position: relative;
        text-shadow:
          0 0 5px #ff0000,
          0 0 10px #ff6600,
          0 0 15px #ffbb00,
          0 0 20px #ffff00,
          0 0 25px #00ff00,
          0 0 30px #00ffff,
          0 0 35px #ff00ff;
        animation:
          dance 0.8s ease-in-out infinite,
          colorChange 2s ease-in-out infinite,
          textGlowPulse 1.5s ease-in-out infinite;
        transform-origin: center;
      }

      @keyframes dance {
        0% {
          transform: translateY(0px) rotate(0deg) scale(1);
        }
        25% {
          transform: translateY(-5px) rotate(5deg) scale(1.1);
        }
        50% {
          transform: translateY(2px) rotate(-3deg) scale(0.95);
        }
        75% {
          transform: translateY(-3px) rotate(3deg) scale(1.05);
        }
        100% {
          transform: translateY(0px) rotate(0deg) scale(1);
        }
      }

      @keyframes colorChange {
        0% {
          text-shadow:
            0 0 5px #ff0000,
            0 0 10px #ff0000,
            0 0 15px #ff0000;
          color: #ff0000;
        }
        25% {
          text-shadow:
            0 0 5px #00ff00,
            0 0 10px #00ff00,
            0 0 15px #00ff00;
          color: #00ff00;
        }
        50% {
          text-shadow:
            0 0 5px #0080ff,
            0 0 10px #0080ff,
            0 0 15px #0080ff;
          color: #0080ff;
        }
        75% {
          text-shadow:
            0 0 5px #ff00ff,
            0 0 10px #ff00ff,
            0 0 15px #ff00ff;
          color: #ff00ff;
        }
        100% {
          text-shadow:
            0 0 5px #ff0000,
            0 0 10px #ff0000,
            0 0 15px #ff0000;
          color: #ff0000;
        }
      }

      @keyframes textGlowPulse {
        0% {
          text-shadow:
            0 0 5px #ff0000,
            0 0 10px #ff6600,
            0 0 15px #ffbb00;
          opacity: 0.8;
        }
        50% {
          text-shadow:
            0 0 15px #ff0000,
            0 0 25px #ff6600,
            0 0 35px #ffbb00,
            0 0 45px #ffff00;
          opacity: 1;
        }
        100% {
          text-shadow:
            0 0 5px #ff0000,
            0 0 10px #ff6600,
            0 0 15px #ffbb00;
          opacity: 0.8;
        }
      }

      .seo-name:hover {
        animation:
          dance 0.4s ease-in-out infinite,
          colorChange 0.5s ease-in-out infinite,
          textGlowPulse 0.5s ease-in-out infinite;
        cursor: pointer;
        letter-spacing: 3px;
        transition: letter-spacing 0.3s ease;
      }

      @media (max-width: 480px) {

          animation:
            dance 0.6s ease-in-out infinite,
            colorChange 2s ease-in-out infinite,
            textGlowPulse 1.5s ease-in-out infinite;
        }
      }
    </style>
